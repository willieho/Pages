<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta
      name="description"
      content="A live wedding countdown widget designed for Canva previews and embeds."
    />
    <meta name="robots" content="index,follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wedding Countdown" />
    <meta
      property="og:description"
      content="A live wedding countdown widget designed for Canva previews and embeds."
    />
    <meta property="og:url" content="https://willieho.github.io/Pages/countdown" />
    <meta property="og:image" content="https://willieho.github.io/Pages/countdown-preview.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wedding Countdown" />
    <meta
      name="twitter:description"
      content="A live wedding countdown widget designed for Canva previews and embeds."
    />
    <meta name="twitter:image" content="https://willieho.github.io/Pages/countdown-preview.png" />
    <link rel="canonical" href="https://willieho.github.io/Pages/countdown" />
    <link
      rel="alternate"
      type="application/json+oembed"
      href="https://willieho.github.io/Pages/countdown.oembed.json"
      title="Wedding Countdown"
    />
    <title>Wedding Countdown</title>
    <style>
      :root {
        --bg: #f8f6f2;
        --ink: #40362f;
        --muted: #6f7f83;
        --line: rgba(64, 54, 47, 0.14);
        --panel: rgba(255, 255, 255, 0.72);
        --accent: #8f5d56;
        --blue: #dfe9eb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100svh;
        overflow: hidden;
        padding: clamp(14px, 4vw, 44px);
        background: linear-gradient(145deg, #fffaf8 0%, var(--bg) 48%, var(--blue) 100%);
        color: var(--ink);
        font-family:
          "Cormorant Garamond",
          "Times New Roman",
          "Noto Serif TC",
          serif;
      }

      body.transparent {
        background: transparent;
      }

      .countdown {
        width: min(920px, 100%);
        max-height: 100%;
        padding: clamp(18px, 4vw, 38px) 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        text-align: center;
      }

      .eyebrow {
        margin: 0;
        color: var(--accent);
        font-family:
          "Inter",
          "Avenir Next",
          "Noto Sans TC",
          sans-serif;
        font-size: clamp(12px, 1.8vw, 14px);
        font-weight: 500;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 8px;
        font-size: clamp(24px, 5vw, 44px);
        font-weight: 500;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .date-line {
        margin: 0 auto clamp(22px, 4vw, 36px);
        color: var(--muted);
        font-family:
          "Inter",
          "Avenir Next",
          "Noto Sans TC",
          sans-serif;
        font-size: clamp(13px, 2vw, 16px);
        line-height: 1.7;
      }

      .time-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: clamp(8px, 1.8vw, 16px);
      }

      .time-card {
        min-width: 0;
        padding: clamp(14px, 3vw, 24px) clamp(8px, 2vw, 16px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.58);
      }

      .value {
        display: block;
        font-family:
          "Inter",
          "Avenir Next",
          "Noto Sans TC",
          sans-serif;
        font-size: clamp(28px, 8vw, 72px);
        font-weight: 300;
        line-height: 0.98;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0;
      }

      .label {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-family:
          "Inter",
          "Avenir Next",
          "Noto Sans TC",
          sans-serif;
        font-size: clamp(10px, 1.9vw, 13px);
        font-weight: 600;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .message {
        margin: clamp(22px, 4vw, 34px) auto 0;
        max-width: 34em;
        color: var(--muted);
        font-size: clamp(15px, 2.4vw, 19px);
        line-height: 1.85;
      }

      @media (max-width: 560px) {
        body {
          padding: 14px;
        }

        .countdown {
          padding: 22px 14px;
        }

        .time-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-height: 360px) {
        body {
          padding-block: 10px;
        }

        .countdown {
          padding-block: 12px;
        }

        h1 {
          margin-block: 6px;
          font-size: clamp(22px, 6vw, 36px);
        }

        .date-line {
          margin-bottom: 12px;
          line-height: 1.4;
        }

        .time-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: 6px;
        }

        .time-card {
          padding: 8px 4px;
        }

        .value {
          font-size: clamp(22px, 7vw, 32px);
        }

        .label {
          margin-top: 5px;
          font-size: 9px;
        }

        .message {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="countdown" aria-live="polite">
      <p class="eyebrow" id="eyebrow">The Countdown</p>
      <h1 id="names">Willie Ho &amp; Wen Huang</h1>
      <p class="date-line" id="dateLine">2030.05.20 10:00 AM</p>

      <section class="time-grid" aria-label="Wedding countdown timer">
        <div class="time-card">
          <span class="value" id="days">00</span>
          <span class="label">Days</span>
        </div>
        <div class="time-card">
          <span class="value" id="hours">00</span>
          <span class="label">Hrs</span>
        </div>
        <div class="time-card">
          <span class="value" id="minutes">00</span>
          <span class="label">Min</span>
        </div>
        <div class="time-card">
          <span class="value" id="seconds">00</span>
          <span class="label">Sec</span>
        </div>
      </section>

      <p class="message" id="message">你是我這輩子最大的冒險，期待與你分享這一天。</p>
    </main>

    <script>
      /*
        Canva usage:
        1. Host this file on an HTTPS static host, such as GitHub Pages or Netlify.
        2. In Canva, use Apps > Embed and paste the hosted URL.
        3. The timer is live only when the Canva design is viewed online. PDF/JPG/PNG exports
           are static and cannot keep JavaScript running.

        URL settings example:
        countdown?date=2030-05-20T10:00:00%2B08:00&names=A%20%26%20B&transparent=1
      */

      const defaults = {
        targetDate: "2030-05-20T10:00:00+08:00",
        eyebrow: "The Countdown",
        names: "Willie & Wen",
        message: "你是我這輩子最大的冒險，期待與你分享這一天。",
        locale: "zh-TW",
        timeZone: "Asia/Taipei",
      };

      const params = new URLSearchParams(window.location.search);
      const config = {
        targetDate: params.get("date") || defaults.targetDate,
        eyebrow: params.get("title") || defaults.eyebrow,
        names: params.get("names") || defaults.names,
        message: params.get("message") || defaults.message,
        locale: params.get("locale") || defaults.locale,
        timeZone: params.get("tz") || defaults.timeZone,
        transparent: ["1", "true", "yes"].includes((params.get("transparent") || "").toLowerCase()),
      };

      const target = new Date(config.targetDate);
      const elements = {
        eyebrow: document.getElementById("eyebrow"),
        names: document.getElementById("names"),
        dateLine: document.getElementById("dateLine"),
        days: document.getElementById("days"),
        hours: document.getElementById("hours"),
        minutes: document.getElementById("minutes"),
        seconds: document.getElementById("seconds"),
        message: document.getElementById("message"),
      };

      if (config.transparent) {
        document.body.classList.add("transparent");
      }

      elements.eyebrow.textContent = config.eyebrow;
      elements.names.textContent = config.names;
      elements.message.textContent = config.message;

      function getSafeDateFormatter(date) {
        try {
          return new Intl.DateTimeFormat(config.locale, {
            timeZone: config.timeZone,
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "numeric",
            minute: "2-digit",
            hour12: true,
          }).format(date);
        } catch {
          return new Intl.DateTimeFormat(defaults.locale, {
            timeZone: defaults.timeZone,
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "numeric",
            minute: "2-digit",
            hour12: true,
          }).format(date);
        }
      }

      function formatDateLine(date) {
        if (Number.isNaN(date.getTime())) return "Please set a valid wedding date";

        return getSafeDateFormatter(date).replace(/\//g, ".");
      }

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function updateCountdown() {
        if (Number.isNaN(target.getTime())) {
          elements.days.textContent = "00";
          elements.hours.textContent = "00";
          elements.minutes.textContent = "00";
          elements.seconds.textContent = "00";
          return;
        }

        const distance = Math.max(0, target.getTime() - Date.now());
        const totalSeconds = Math.floor(distance / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        elements.days.textContent = pad(days);
        elements.hours.textContent = pad(hours);
        elements.minutes.textContent = pad(minutes);
        elements.seconds.textContent = pad(seconds);
      }

      elements.dateLine.textContent = formatDateLine(target);
      updateCountdown();
      window.setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
